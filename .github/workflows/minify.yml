name: Minify and Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create dist directory
        run: mkdir -p dist
      - name: Minify HTML
        run: npx html-minifier index.html --output dist/index.html
      - name: Minify CSS
        run: npx clean-css -o dist/styles.min.css styles.css
      - name: Minify JS
        run: npx uglifyjs script.js -c -m --output dist/script.min.js
      - name: Copy static files
        run: |
          cp LICENSE dist/
          cp README.md dist/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist